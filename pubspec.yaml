name: csv_plus
description: >-
  Fast, complete CSV parser for Dart. Encode, decode, stream, query, and validate CSV data with automatic type inference and zero dependencies.
version: 1.0.0
repository: https://github.com/almasumdev/csv_plus
homepage: https://github.com/almasumdev/csv_plus
issue_tracker: https://github.com/almasumdev/csv_plus/issues

topics:
  - csv
  - csv-parser
  - serialization
  - deserialization
  - encoding

screenshots:
  - description: The csv_plus logo.
    path: images/logo.png

environment:
  # Floor is 3.8.0 because the dev toolchain (lints ^6) requires it, so a
  # lower floor was never actually resolvable for development. The library
  # itself uses only 3.0-era features (records, patterns), so consumers on
  # 3.8.0+ are fine.
  sdk: ^3.8.0

dependencies:

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
