name: csv_plus
description: >-
  Fast, complete CSV parser for Dart. Encode, decode, stream, query, and validate CSV data with automatic type inference and zero dependencies.
version: 1.0.0
repository: https://github.com/Masum-MSNR/csv_plus
homepage: https://github.com/Masum-MSNR/csv_plus
issue_tracker: https://github.com/Masum-MSNR/csv_plus/issues

topics:
  - csv
  - csv-parser
  - serialization
  - data-processing
  - file-handling

environment:
  # Floor is 3.6.0 because the dev toolchain (lints ^6) requires it, so
  # 3.5.0 was never actually resolvable. The library uses only 3.0-era
  # language features (records, patterns), so consumers on 3.6.0+ are fine.
  sdk: ^3.6.0

dependencies:

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
