name: CI & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install
        run: dart pub get

      - name: Format
        # benchmark/ is a dev-only harness with its own pubspec; it is out of
        # every gate (see analysis_options.yaml and .pubignore).
        run: dart format --output=none --set-exit-if-changed lib test example tool

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: dart test

  web-compile:
    name: Web compile gate (js + wasm)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Compile with dart2js
        run: dart compile js tool/web_smoke.dart -o "$RUNNER_TEMP/smoke.js"

      - name: Compile with wasm
        run: dart compile wasm tool/web_smoke.dart -o "$RUNNER_TEMP/smoke.wasm"

  pana:
    name: Pana score gate
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Require >= 160 pub points
        run: |
          dart pub global activate pana
          dart pub global run pana --json > pana.json 2> pana.err || true
          POINTS=$(jq -r '.scores.grantedPoints // empty' pana.json)
          MAX=$(jq -r '.scores.maxPoints // empty' pana.json)
          echo "Pana score: ${POINTS:-?}/${MAX:-?}"
          if [ -z "$POINTS" ]; then
            echo "::error::Could not read pana score."; tail -n 50 pana.err; exit 1
          fi
          if [ "$POINTS" -lt 160 ]; then
            echo "::error::pana $POINTS/$MAX is below the required 160; aborting."; exit 1
          fi

  version:
    name: Resolve version
    needs: [pana, web-compile]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_new: ${{ steps.v.outputs.is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: v
        name: Is this a new version?
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is already tagged; nothing to release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is new; will tag, then publish."
          fi

  # Push the tag with a PAT so it triggers the Publish workflow; a default
  # GITHUB_TOKEN push would not.
  tag:
    name: Tag release
    needs: [version]
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create & push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
